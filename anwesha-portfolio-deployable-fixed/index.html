<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./anwesha-portfolio-deployable/" />
  <title>Anwesha Mishra Portfolio</title>
  <meta name="description" content="Redirecting to the Anwesha Mishra portfolio website." />
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f6f8fc 0%, #eef1fd 100%);
      color: #13151f;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border: 1px solid #e4e8f0;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 60px -28px rgba(20,30,60,0.24);
      max-width: 520px;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 1.6rem; }
    p { margin: 0 0 16px; line-height: 1.6; color: #5c6478; }
    a { color: #3452e1; font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Redirecting to the portfolio</h1>
    <p>If you are not automatically redirected, please open the portfolio directly:</p>
    <p><a href="./anwesha-portfolio-deployable/">Open Anwesha Mishra Portfolio</a></p>
  </main>
  <script>
    window.location.replace('./anwesha-portfolio-deployable/');
  </script>
</body>
</html>
